# AI小说生成器 Docker Compose 配置
# 使用方法: docker-compose up -d

version: '3.8'

services:
  novel-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-novel-generator
    ports:
      - "7860:7860"
    environment:
      # 登录认证配置 (请修改为强密码)
      - APP_USERNAME=admin
      - APP_PASSWORD=novel2024
      # 时区设置
      - TZ=Asia/Shanghai
    volumes:
      # 持久化数据目录
      - ./novels:/app/novels
      - ./vectorstore:/app/vectorstore
      # 配置文件
      - ./config.json:/app/config.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# 数据卷定义
volumes:
  novels_data:
  vectorstore_data:
