{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-6">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-cyan-400 flex items-center">
            <svg class="w-8 h-8 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
            </svg>
            角色状态
        </h1>
        <p class="text-zinc-400 mt-1">路径: <span class="text-zinc-200">{{ filepath }}</span></p>
    </div>

    <div class="bg-zinc-800 rounded-lg p-6">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-cyan-400">Character State</h2>
            <div class="flex items-center space-x-2">
                <button onclick="saveFile('character_state.txt')" class="bg-emerald-600 hover:bg-emerald-700 text-white py-2 px-4 rounded transition-all">
                    💾 保存
                </button>
                <a href="/" class="bg-zinc-600 hover:bg-zinc-700 text-white py-2 px-4 rounded transition-all">
                    ↩️ 返回
                </a>
            </div>
        </div>
        <textarea id="fileContent" class="w-full h-[50rem] bg-zinc-900 text-zinc-100 border border-zinc-700 rounded p-4 leading-relaxed resize-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-colors font-mono text-sm">{{ content or '' }}</textarea>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function saveFile(filename) {
    const content = document.getElementById('fileContent').value;
    const baseURL = new URL(window.location.href).origin;

    const response = await fetch(`${baseURL}/api/file/save`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            filepath: '{{ filepath }}',
            filename: filename,
            content: content
        })
    });
    const result = await response.json();
    log(result.message);
}
</script>
{% endblock %}
